services:
  postgres:
    image: postgres:16-alpine
    container_name: autoai_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: autoai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build: ./backend
    container_name: autoai_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  celery_worker:
    build: ./backend
    container_name: autoai_celery
    command: >
      celery -A app.tasks.celery_app worker
      -l info
      --pool=solo
      --max-tasks-per-child=100
      --concurrency=2
      -Q celery,high_priority,default
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  celery_worker_high:
    build: ./backend
    container_name: autoai_celery_high
    command: >
      celery -A app.tasks.celery_app worker
      -l info
      --pool=solo
      --max-tasks-per-child=50
      --concurrency=2
      -Q celery,high_priority,default
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  flower:
    build: ./backend
    container_name: autoai_flower
    command: celery -A app.tasks.celery_app flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoai_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  postgres_data:
